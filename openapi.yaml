# ==========================================================
# COMPONENTS
# ==========================================================
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Not Found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

  schemas:
    Error:
      type: object
      properties:
        error: { type: string }
        message: { type: string }

    AuthResponse:
      type: object
      properties:
        token: { type: string }
        user:  { $ref: '#/components/schemas/User' }

    User:
      type: object
      properties:
        id: { type: string }
        email: { type: string, format: email }
        name: { type: string }
        avatar_url: { type: string }
        role: { type: string, enum: [student, teacher, admin, parent, supervisor, fiqh_supervisor, quality_supervisor] }
        has_academy_access: { type: boolean }
        platform_preference: { type: string }
        level: { type: string }
        points: { type: integer }
        created_at: { type: string, format: date-time }

    Course:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        description: { type: string }
        category: { type: string }
        level: { type: string, enum: [beginner, intermediate, advanced] }
        teacher_id: { type: string }
        cover_url: { type: string }
        completion_percent: { type: integer }
        lessons_count: { type: integer }

    Lesson:
      type: object
      properties:
        id: { type: string }
        course_id: { type: string }
        title: { type: string }
        description: { type: string }
        video_url: { type: string }
        attachments: { type: array, items: { type: string } }
        order: { type: integer }
        progress: { type: integer }
        status: { type: string, enum: [pending_review, approved, rejected] }

    Task:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        description: { type: string }
        due_date: { type: string, format: date-time }
        status: { type: string, enum: [pending, submitted, graded, overdue] }
        grade: { type: number }
        note: { type: string }

    Session:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        scheduled_at: { type: string, format: date-time }
        duration_minutes: { type: integer }
        meeting_link: { type: string }
        recording_url: { type: string }
        status: { type: string, enum: [scheduled, live, ended] }

    CalendarEvent:
      type: object
      properties:
        id: { type: string }
        type: { type: string, enum: [session, lesson, task, deadline] }
        title: { type: string }
        date: { type: string, format: date-time }
        link: { type: string }

    MushafPage:
      type: object
      properties:
        page: { type: integer }
        status: { type: string, enum: [memorized, reviewed, none] }

    Badge:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string }
        image_url: { type: string }
        points_reward: { type: integer }
        progress: { type: integer }
        target: { type: integer }
        earned: { type: boolean }

    PointEntry:
      type: object
      properties:
        id: { type: string }
        amount: { type: integer }
        reason: { type: string }
        event: { type: string }
        created_at: { type: string, format: date-time }

    EnrollmentRequest:
      type: object
      properties:
        id: { type: string }
        course_id: { type: string }
        course_title: { type: string }
        status: { type: string, enum: [pending, accepted, rejected] }
        reason: { type: string }
        created_at: { type: string, format: date-time }

    ParentRequest:
      type: object
      properties:
        id: { type: string }
        parent_id: { type: string }
        parent_name: { type: string }
        relation: { type: string, enum: [father, mother, guardian] }
        status: { type: string, enum: [pending, accepted, rejected] }

    LearningPath:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        type: { type: string, enum: [quran_memorization, tajweed, fiqh, aqeedah, seerah, tafsir] }
        stages:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              title: { type: string }
              locked: { type: boolean }
              progress: { type: integer }

    ProgressPoint:
      type: object
      properties:
        date: { type: string, format: date }
        memorized: { type: integer }
        reviewed: { type: integer }

    Competition:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        type: { type: string, enum: [recitation, ramadan, tajweed] }
        start_date: { type: string, format: date }
        end_date: { type: string, format: date }
        rules: { type: string }
        required_files: { type: array, items: { type: string } }

    FiqhQuestion:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        body: { type: string }
        category_id: { type: string }
        status: { type: string, enum: [new, in_review, answered, rejected] }
        answer: { type: string }
        answered_by: { type: string }
        answered_at: { type: string, format: date-time }

    ForumTopic:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        body: { type: string }
        category_id: { type: string }
        author_id: { type: string }
        replies_count: { type: integer }
        created_at: { type: string, format: date-time }

    Certificate:
      type: object
      properties:
        id: { type: string }
        course_id: { type: string }
        full_name: { type: string }
        issued_at: { type: string, format: date-time }
        status: { type: string, enum: [pending, issued, revoked] }
        pdf_url: { type: string }
